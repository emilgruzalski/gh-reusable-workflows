name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight

jobs:
  secret-scan:
    uses: emilgruzalski/gh-reusable-workflows/.github/workflows/secret-scan.yml@v1
    permissions:
      contents: read
      security-events: write
