name: Dependency Review

on:
  pull_request:
    branches: [main]

jobs:
  dependency-review:
    uses: emilgruzalski/gh-reusable-workflows/.github/workflows/dependency-review.yml@v1
    with:
      fail-on-severity: 'moderate'  # low, moderate, high, or critical
      # Optional: Specify allowed licenses
      # allow-licenses: 'MIT,Apache-2.0,BSD-3-Clause'
      # Optional: Deny specific licenses
      # deny-licenses: 'GPL-3.0,AGPL-3.0'
    permissions:
      contents: read
      pull-requests: write
