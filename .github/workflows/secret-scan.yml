name: Secret Scanning

on:
  workflow_call:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read           # For checking out code and scanning repository
      security-events: write   # For uploading secret scan results
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Full history needed for comprehensive secret scanning

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@7c0734f987ad0bb30ee8da210773b800ee2016d3 # v3.93.4
        with:
          extra_args: --only-verified  # Only report verified/active secrets
