name: Continuous Integration Node.js

on:
  workflow_call:
    inputs:
      node-version-file:
        required: false
        type: string
        default: "package.json"
      working-directory:
        required: false
        type: string
        default: "."
      image-name:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: "./Dockerfile"
      context:
        required: false
        type: string
        default: "."
      push:
        required: false
        type: boolean
        default: true
    outputs:
      image:
        description: Full image reference with tag
        value: ${{ jobs.ci.outputs.image }}
      digest:
        description: Image digest
        value: ${{ jobs.ci.outputs.digest }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write          # For creating releases
      packages: write          # For pushing Docker images to ghcr.io
      security-events: write   # For uploading SARIF security scan results
      id-token: write          # For OIDC/Sigstore keyless image signing
    outputs:
      image: ${{ steps.build-image.outputs.image }}
      digest: ${{ steps.build-image.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Code quality
        uses: emilgruzalski/gh-reusable-workflows/.github/actions/cq-node@v1
        with:
          node-version-file: ${{ inputs.node-version-file }}
          working-directory: ${{ inputs.working-directory }}

      - name: Build and push Docker image
        id: build-image
        uses: emilgruzalski/gh-reusable-workflows/.github/actions/build-image@v1
        with:
          image-name: ${{ inputs.image-name }}
          dockerfile: ${{ inputs.dockerfile }}
          context: ${{ inputs.context }}
          push: ${{ inputs.push }}
          github-token: ${{ github.token }}
