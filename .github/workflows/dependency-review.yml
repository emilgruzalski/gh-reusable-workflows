name: Dependency Review

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: 'Vulnerability severity level to fail on (low, moderate, high, critical)'
        required: false
        type: string
        default: 'moderate'
      allow-licenses:
        description: 'Comma-separated list of allowed licenses (e.g., MIT,Apache-2.0,BSD-3-Clause)'
        required: false
        type: string
        default: ''
      deny-licenses:
        description: 'Comma-separated list of denied licenses (e.g., GPL-3.0,AGPL-3.0)'
        required: false
        type: string
        default: ''

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read           # For checking out code
      pull-requests: write     # For commenting on PRs with review results
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@4081bf99e2866ebe428fc0477b69eb4fcda7220a # v4.5.0
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          allow-licenses: ${{ inputs.allow-licenses }}
          deny-licenses: ${{ inputs.deny-licenses }}
          comment-summary-in-pr: true
