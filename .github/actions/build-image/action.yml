name: Build and push Docker image
description: Builds a Docker image and pushes it to ghcr.io
author: 'Emil Grużalski'

branding:
  icon: 'package'
  color: 'blue'

inputs:
  image-name:
    description: 'Name of the Docker image (without registry prefix). Will be pushed to ghcr.io/<owner>/<image-name>.'
    required: true
  dockerfile:
    description: 'Path to the Dockerfile relative to the build context. Defaults to ./Dockerfile.'
    required: false
    default: "./Dockerfile"
  context:
    description: 'Docker build context directory. The path from which Docker will build the image. Defaults to repository root.'
    required: false
    default: "."
  platforms:
    description: 'Comma-separated list of target platforms for multi-architecture builds (e.g., linux/amd64,linux/arm64,linux/arm/v7).'
    required: false
    default: "linux/amd64,linux/arm64"
  push:
    description: 'Whether to push the built image to the registry. Set to false for testing builds locally.'
    required: false
    default: "true"
  github-token:
    description: 'GitHub token for authenticating to ghcr.io. Typically use secrets.GITHUB_TOKEN or github.token.'
    required: true
  build-args:
    description: 'Docker build arguments, one per line (e.g., ARG_NAME=value). Used to pass build-time variables to the Dockerfile.'
    required: false
    default: ""

outputs:
  image:
    description: Full image reference with SHA tag (e.g., ghcr.io/owner/image:sha-abc1234)
    value: ${{ steps.image-ref.outputs.image }}
  digest:
    description: Image digest
    value: ${{ steps.build.outputs.digest }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        if [[ ! "${{ inputs.image-name }}" =~ ^[a-z0-9]([a-z0-9-]*[a-z0-9])?$ ]]; then
          echo "Error: image-name must contain only lowercase letters, numbers, and hyphens, must start and end with a lowercase letter or number, and must be at least two characters long"
          exit 1
        fi

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
        tags: |
          type=sha
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Set image reference output
      id: image-ref
      shell: bash
      run: |
        IMAGE_REF="ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:sha-$(echo ${{ github.sha }} | cut -c1-7)"
        echo "image=$IMAGE_REF" >> "$GITHUB_OUTPUT"
        echo "## Docker Image Built" >> "$GITHUB_STEP_SUMMARY"
        echo "Image: \`$IMAGE_REF\`" >> "$GITHUB_STEP_SUMMARY"
        echo "Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
