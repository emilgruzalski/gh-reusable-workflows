name: Security scan
description: Scans source code and dependencies for vulnerabilities using Trivy
author: 'Emil Gruzalski'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  working-directory:
    description: 'Directory containing source code and dependencies to scan for security vulnerabilities. Defaults to repository root.'
    required: false
    default: "."
  severity:
    description: 'Comma-separated list of vulnerability severity levels to report (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL). Only specified severities will be included in results.'
    required: false
    default: "CRITICAL,HIGH"
  exit-code:
    description: 'Exit code to return when vulnerabilities are found. Use 1 to fail the workflow, or 0 to report as warnings only.'
    required: false
    default: "1"
  upload-sarif:
    description: 'Whether to upload scan results to GitHub Security tab for code scanning alerts. Requires security-events: write permission.'
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # v0.34.0
      with:
        scan-type: "fs"
        scan-ref: ${{ inputs.working-directory }}
        format: "sarif"
        output: "trivy-results.sarif"
        severity: ${{ inputs.severity }}
        exit-code: ${{ inputs.exit-code }}

    - name: Upload Trivy scan results to GitHub Security tab
      if: ${{ inputs.upload-sarif == 'true' && always() }}
      uses: github/codeql-action/upload-sarif@9e907b5e64f6b83e7804b09294d44122997950d6 # v4.32.3
      with:
        sarif_file: "trivy-results.sarif"
