name: Node code quality
description: Runs lint, tests, and build for Node.js projects using Bun
author: 'Emil Grużalski'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  node-version-file:
    description: 'Path to file containing Node.js version (package.json, .nvmrc, or .node-version). Used to determine which Node version to install.'
    required: false
    default: "package.json"
  working-directory:
    description: 'Directory containing the Node.js project to test, lint, and build. Defaults to repository root.'
    required: false
    default: "."

outputs:
  test-result:
    description: 'Test execution result (success/failure)'
    value: ${{ steps.test.outputs.result }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2.1.2

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install --frozen-lockfile

    - name: Lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun run lint

    - name: Test
      id: test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if bun test; then
          echo "result=success" >> "$GITHUB_OUTPUT"
        else
          echo "result=failure" >> "$GITHUB_OUTPUT"
          TEST_FAILED=1
        fi
        echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
        echo "✅ Tests completed" >> "$GITHUB_STEP_SUMMARY"
        if [ "${TEST_FAILED:-0}" -ne 0 ]; then
          exit 1
        fi

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        bun run build
        echo "## Build Status" >> "$GITHUB_STEP_SUMMARY"
        echo "✅ Build successful" >> "$GITHUB_STEP_SUMMARY"
