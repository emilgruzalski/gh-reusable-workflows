name: Python code quality
description: Runs linting, formatting check, and tests for Python projects using uv
author: 'Emil Grużalski'

branding:
  icon: 'check-circle'
  color: 'yellow'

inputs:
  python-version-file:
    description: 'Path to file containing Python version configuration (pyproject.toml, .python-version). Used to determine which Python version to install.'
    required: false
    default: "pyproject.toml"
  working-directory:
    description: 'Directory containing the Python project to test, lint, and format check. Defaults to repository root.'
    required: false
    default: "."

outputs:
  test-result:
    description: 'Test execution result (success/failure)'
    value: ${{ steps.test.outputs.result }}

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version-file: ${{ inputs.python-version-file }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv sync

    - name: Lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv run ruff check .

    - name: Format check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv run ruff format --check .

    - name: Test
      id: test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if uv run pytest; then
          echo "result=success" >> "$GITHUB_OUTPUT"
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Tests completed" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "result=failure" >> "$GITHUB_OUTPUT"
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "❌ Tests failed" >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi
