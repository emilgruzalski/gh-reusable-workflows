name: Python code quality
description: Runs linting, formatting check, and tests for Python projects using uv
author: 'Emil Gruzalski'

branding:
  icon: 'check-circle'
  color: 'yellow'

inputs:
  python-version-file:
    description: 'Path to file containing Python version configuration (pyproject.toml, .python-version). Used to determine which Python version to install.'
    required: false
    default: "pyproject.toml"
  working-directory:
    description: 'Directory containing the Python project to test, lint, and format check. Defaults to repository root.'
    required: false
    default: "."

outputs:
  test-result:
    description: 'Test execution result (success/failure)'
    value: ${{ steps.test.outputs.result }}

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
      with:
        enable-cache: true

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version-file: ${{ inputs.python-version-file }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv sync

    - name: Lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv run ruff check .

    - name: Format check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: uv run ruff format --check .

    - name: Test
      id: test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        uv run pytest && echo "result=success" >> "$GITHUB_OUTPUT" || echo "result=failure" >> "$GITHUB_OUTPUT"
        echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
        echo "✅ Tests completed" >> "$GITHUB_STEP_SUMMARY"
