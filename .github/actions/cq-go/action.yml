name: Go code quality
description: Runs linting and tests for Go projects
author: 'Emil Gruzalski'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  go-version-file:
    description: 'Path to the file containing Go version (go.mod or .go-version). Used to determine which Go version to install.'
    required: false
    default: "go.mod"
  working-directory:
    description: 'Directory containing the Go module to test and lint. Defaults to repository root.'
    required: false
    default: "."

outputs:
  coverage:
    description: 'Test coverage percentage'
    value: ${{ steps.test.outputs.coverage }}

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache-dependency-path: ${{ inputs.working-directory }}/go.sum
        cache: true

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: go mod download

    - name: Vet
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: go vet ./...

    - name: Lint
      uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
      with:
        working-directory: ${{ inputs.working-directory }}

    - name: Test
      id: test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        go test -race -coverprofile=coverage.out ./...
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
        echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
        echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
        echo "Coverage: $COVERAGE" >> "$GITHUB_STEP_SUMMARY"
