name: Go code quality
description: Runs linting and tests for Go projects
author: 'Emil Grużalski'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  go-version-file:
    description: 'Path to the file containing Go version (go.mod or .go-version). Used to determine which Go version to install.'
    required: false
    default: "go.mod"
  working-directory:
    description: 'Directory containing the Go module to test and lint. Defaults to repository root.'
    required: false
    default: "."

outputs:
  coverage:
    description: 'Test coverage percentage'
    value: ${{ steps.test.outputs.coverage }}

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache-dependency-path: ${{ inputs.working-directory }}/go.sum
        cache: true

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: go mod download

    - name: Vet
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: go vet ./...

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        working-directory: ${{ inputs.working-directory }}

    - name: Test
      id: test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        go test -race -coverprofile=coverage.out ./...
        if [ -f coverage.out ]; then
          TOTAL_LINE=$(go tool cover -func=coverage.out | grep 'total' || true)
          if [ -n "$TOTAL_LINE" ]; then
            COVERAGE=$(awk '{print $3}' <<< "$TOTAL_LINE")
          else
            COVERAGE="0.0%"
          fi
        else
          COVERAGE="0.0%"
        fi
        echo "coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
        echo "## Test Coverage" >> "$GITHUB_STEP_SUMMARY"
        echo "Coverage: $COVERAGE" >> "$GITHUB_STEP_SUMMARY"
